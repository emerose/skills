# Private vocabulary for archivist's metadata extractor — EXAMPLE.
#
# The public skills repo ships only generic placeholder vendors ("Vendor A", …)
# and vendor-neutral study-id shapes. Your real CRO/vendor names and any
# vendor-specific study-id formats are program-specific, so keep them HERE, in
# your (private) data repo — never in the public skills repo.
#
# Place this file at the root of your data folder as `vocab.yml` (or point
# $ARCHIVIST_VOCAB at it). `arx` loads it automatically and MERGES it over the
# generic defaults, so the extractor canonicalizes your real names and recognizes
# your study-id formats. Values are case-insensitive regex fragments.

# canonical CRO/vendor name -> alias regex fragments
cros:
  "Real CRO Inc.": ["real cro", "\\bRCI\\b"]
  "Example Bio": ["example bio", "\\bEXB\\b"]

# extra study-id shapes your vendors use (added to the generic defaults)
study_id_patterns:
  - "\\bRCI-\\d{6}\\b"        # e.g. RCI-012345
  - "\\b25[A-Z]-[A-Z]{3}-\\d{3}\\b"
